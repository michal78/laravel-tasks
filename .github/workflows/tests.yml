name: Run tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: "8.2"
            illuminate-version: "^11.0"
            testbench-version: "^9.0"
          - php-version: "8.2"
            illuminate-version: "^12.0"
            testbench-version: "^10.0"
          - php-version: "8.3"
            illuminate-version: "^13.0"
            testbench-version: "^11.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require --no-update --no-interaction \
            "illuminate/console:${{ matrix.illuminate-version }}" \
            "illuminate/support:${{ matrix.illuminate-version }}" \
            "illuminate/cache:${{ matrix.illuminate-version }}" \
            "illuminate/database:${{ matrix.illuminate-version }}"
          composer require --dev --no-update --no-interaction \
            "orchestra/testbench:${{ matrix.testbench-version }}"
          composer update --no-interaction --no-progress --prefer-dist --no-security-blocking

      - name: Run tests
        run: composer test
